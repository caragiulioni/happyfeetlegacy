<html>
  <head>
    <meta charset="UTF-8">
    <title>Happy Feet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@800&display=swap" rel="stylesheet">
    <link rel="icon" href="images/favicon.png" type="image/x-icon" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        overflow: hidden;
        background-color: #a8c8d8;
        background-image: 
          radial-gradient(circle at 15% 15%, rgba(255,255,255,0.4) 1px, transparent 1px),
          radial-gradient(circle at 45% 10%, rgba(255,255,255,0.3) 2px, transparent 2px),
          radial-gradient(circle at 75% 20%, rgba(255,255,255,0.35) 1.5px, transparent 1.5px),
          radial-gradient(circle at 90% 45%, rgba(255,255,255,0.4) 1px, transparent 1px),
          radial-gradient(circle at 25% 50%, rgba(255,255,255,0.25) 2.5px, transparent 2.5px),
          radial-gradient(circle at 60% 55%, rgba(255,255,255,0.3) 1px, transparent 1px),
          radial-gradient(circle at 10% 75%, rgba(255,255,255,0.35) 2px, transparent 2px),
          radial-gradient(circle at 50% 80%, rgba(255,255,255,0.4) 1.5px, transparent 1.5px),
          radial-gradient(circle at 85% 85%, rgba(255,255,255,0.3) 1px, transparent 1px),
          radial-gradient(circle at 35% 90%, rgba(255,255,255,0.25) 2px, transparent 2px),
          radial-gradient(circle at 70% 70%, rgba(255,255,255,0.35) 1.5px, transparent 1.5px),
          radial-gradient(circle at 5% 40%, rgba(255,255,255,0.3) 1px, transparent 1px),
          radial-gradient(circle at 95% 60%, rgba(255,255,255,0.4) 2px, transparent 2px),
          radial-gradient(circle at 40% 35%, rgba(255,255,255,0.3) 1.5px, transparent 1.5px),
          radial-gradient(circle at 65% 95%, rgba(255,255,255,0.35) 1px, transparent 1px);
        background-size: 120px 120px;
        font-family: 'Work Sans', sans-serif;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #app {
        position: relative;
        overflow: hidden;
      }
    </style>
    <script>function playaudio (){
      var audio = document.getElementById("opening");
      if (audio) audio.play();
    }</script>
    </head>
  <body onload="playaudio()">
    <audio id="opening" hidden="true">
      <source src="./audio/opening.mp3">
    </audio>
    <div id="app"></div>
    <script src="js/data.js"></script>
    <script src="js/text.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/engine-utilities.js"></script>
    <script src="js/snow.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/player.js"></script>
    <script src="js/main.js"></script>
    <script>
    </script>
  </body>
</html>
